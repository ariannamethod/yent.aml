<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>web/tests/test_bpe — JS ↔ C parity</title>
<style>
 body { background:#0a0a0d; color:#e8e2d6; font:13px/1.5 ui-monospace,monospace; padding:20px; }
 .pass { color:#7fbf7f; }
 .fail { color:#df6464; }
 .skip { color:#8a8a90; }
 pre  { background:#14141a; padding:8px 12px; border-radius:4px; overflow-x:auto; }
 hr { border:0; border-top:1px solid #2a2a35; margin:12px 0; }
 h1 { font-size:14px; letter-spacing:0.06em; }
</style>
</head>
<body>
<h1>web/tests/test_bpe — JS BPE ↔ C BPE parity</h1>
<p>Loads <code>../janus_v4_bpe_merges.json</code> + <code>./bpe_fixtures.json</code>
   (generated by <code>tests/bpe_parity</code> on the C side) and asserts
   <code>encode</code> and <code>decode</code> match byte-for-byte for each
   sample prompt.</p>
<div id="out"></div>

<script type="module">
import { BPE, loadBPEFromURL, BOS, USER_START, USER_END, ASST_START, ASST_END,
         wrapJanusChat } from '../lib/bpe.js';

const out = document.getElementById('out');
function row(cls, label, body) {
    const div = document.createElement('div');
    div.innerHTML = `<span class="${cls}">[${cls.toUpperCase()}]</span> <b>${label}</b>` +
                    (body ? `<pre>${body}</pre>` : '');
    out.appendChild(div);
}

(async () => {
    let pass = 0, fail = 0;

    // 1. Load merges + fixtures
    let bpe, fixtures;
    try {
        bpe      = await loadBPEFromURL('../janus_v4_bpe_merges.json');
        fixtures = await (await fetch('./bpe_fixtures.json')).json();
        row('pass', `loaded BPE: vocab_size=${bpe.vocabSize} n_merges=${bpe.nMerges}`);
        pass++;
    } catch (e) {
        row('fail', `load failed: ${e.message}`);
        return;
    }

    row('pass', `loaded ${fixtures.length} C fixtures`);
    pass++;

    // 2. encode parity
    for (const fx of fixtures) {
        const got = bpe.encode(fx.prompt);
        const eq  = got.length === fx.ids.length &&
                    got.every((v, i) => v === fx.ids[i]);
        if (eq) {
            row('pass', `encode ${JSON.stringify(fx.prompt)}`,
                `got: ${JSON.stringify(got)}`);
            pass++;
        } else {
            row('fail', `encode ${JSON.stringify(fx.prompt)}`,
                `expected: ${JSON.stringify(fx.ids)}\ngot:      ${JSON.stringify(got)}`);
            fail++;
        }
    }

    // 3. decode parity
    for (const fx of fixtures) {
        const got = bpe.decode(fx.ids);
        if (got === fx.decoded) {
            row('pass', `decode ${JSON.stringify(fx.ids).slice(0, 60)}…`);
            pass++;
        } else {
            row('fail', `decode mismatch`,
                `expected: ${JSON.stringify(fx.decoded)}\ngot:      ${JSON.stringify(got)}`);
            fail++;
        }
    }

    // 4. wrapJanusChat shape check
    {
        const ids  = bpe.encode("Who are you?");
        const ctx  = wrapJanusChat(ids);
        const want = [BOS, USER_START, ...ids, USER_END, ASST_START];
        const eq   = ctx.length === want.length && ctx.every((v, i) => v === want[i]);
        if (eq) { row('pass', `wrapJanusChat layout matches`,
                      `ctx[0..1]=[${BOS},${USER_START}], ctx[end-1..]=[${USER_END},${ASST_START}], len=${ctx.length}`);
                  pass++; }
        else    { row('fail', `wrapJanusChat layout mismatch`); fail++; }
    }

    document.querySelector('h1').innerHTML +=
        ` — <span class="${fail ? 'fail' : 'pass'}">${pass} PASS / ${fail} FAIL</span>`;
})();
</script>
</body>
</html>
