<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>yent.aml — chat</title>
<style>
  :root {
    --bg: #0a0a0d;
    --bg2: #14141a;
    --fg: #e8e2d6;
    --dim: #6b6b78;
    --user: #5b8fb8;
    --asst: #d4a92b;
    --grid: #1d1d28;
    --err:  #d46b3b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.55 ui-monospace, "JetBrains Mono", "SF Mono", Consolas, monospace;
    height: 100%;
  }
  body { display: flex; flex-direction: column; overflow: hidden; }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--grid);
    display: flex;
    gap: 18px;
    align-items: baseline;
    background: var(--bg2);
  }
  header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.06em; }
  header .sub { color: var(--dim); font-weight: 400; margin-left: 8px; }
  header .stat { color: var(--dim); font-size: 11px; margin-left: auto; }
  header .stat b { color: var(--fg); font-weight: 500; }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { display: flex; gap: 12px; align-items: flex-start; max-width: 880px; }
  .msg .role {
    flex: 0 0 60px;
    color: var(--dim);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding-top: 2px;
  }
  .msg.user .role { color: var(--user); }
  .msg.asst .role { color: var(--asst); }
  .msg .body { white-space: pre-wrap; word-break: break-word; flex: 1; }
  .msg.err .body { color: var(--err); }

  #cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--asst);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0 } }

  #status {
    padding: 8px 20px;
    border-top: 1px solid var(--grid);
    background: var(--bg2);
    color: var(--dim);
    font-size: 11px;
    min-height: 28px;
  }
  #status.busy { color: var(--asst); }
  #status.err  { color: var(--err);  }

  #bar {
    padding: 12px 20px;
    border-top: 1px solid var(--grid);
    background: var(--bg2);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  #bar textarea {
    flex: 1;
    background: transparent;
    border: 1px solid var(--grid);
    color: var(--fg);
    padding: 10px 12px;
    font: inherit;
    border-radius: 4px;
    resize: none;
    min-height: 42px;
    max-height: 180px;
  }
  #bar textarea:focus { outline: 1px solid var(--asst); }
  #bar button {
    background: var(--asst);
    color: var(--bg);
    border: none;
    padding: 10px 22px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    border-radius: 4px;
    height: 42px;
  }
  #bar button:hover { filter: brightness(1.1); }
  #bar button:disabled { opacity: 0.4; cursor: not-allowed; }
  #bar .small {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--grid);
    padding: 8px 12px;
    height: 42px;
  }
  #bar .small:hover { color: var(--fg); }

  /* Setup overlay */
  #setup {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 13, 0.96);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  #setup .panel {
    background: var(--bg2);
    border: 1px solid var(--grid);
    border-radius: 6px;
    padding: 28px 32px;
    max-width: 600px;
    width: calc(100% - 40px);
  }
  #setup h2 { font-size: 15px; margin-bottom: 14px; letter-spacing: 0.04em; }
  #setup p { color: var(--dim); font-size: 12px; margin-bottom: 14px; }
  #setup .row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  #setup input[type=text] {
    flex: 1;
    background: transparent;
    border: 1px solid var(--grid);
    color: var(--fg);
    padding: 8px 12px;
    font: inherit;
    border-radius: 4px;
  }
  #setup input[type=file] { color: var(--dim); }
  #setup button {
    background: var(--asst);
    color: var(--bg);
    border: none;
    padding: 9px 18px;
    font: inherit;
    font-weight: 600;
    border-radius: 4px;
    cursor: pointer;
  }
  #setup button.ghost {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--grid);
  }
  #setup .hint { font-size: 11px; color: var(--dim); }
  #setup pre { font-size: 11px; color: var(--dim); margin-top: 10px; line-height: 1.4; }
</style>
</head>
<body>

<header>
  <h1>yent.aml<span class="sub">— Janus 176M Yent SFT, in your browser</span></h1>
  <div class="stat" id="stat">
    <span id="stat-model">no weights</span> ·
    <b id="stat-tps">— tok/s</b>
  </div>
</header>

<div id="log"></div>

<div id="status">idle.</div>

<div id="bar">
  <textarea id="prompt" placeholder="ask yent…  (⌘/Ctrl+Enter to send, Esc to stop)" rows="1"></textarea>
  <button id="send">send</button>
  <button id="stop" class="small" disabled>stop</button>
  <button id="reset" class="small" title="forget chat history + tail">reset</button>
</div>

<div id="setup">
  <div class="panel">
    <h2>load yent weights</h2>
    <p>The browser engine needs a Janus-format GGUF (Q8_0 ≈190 MB or Q4_K ≈110 MB).</p>

    <div class="row">
      <input type="text" id="weights-url"
             placeholder="https://huggingface.co/ataeff/yent.aml/resolve/main/yent_v4_sft_q8_0.gguf" />
      <button id="load-url">load url</button>
    </div>
    <div class="row">
      <input type="file" id="weights-file" accept=".gguf" />
      <button class="ghost" id="load-file">load file</button>
    </div>

    <div class="hint">Or pass <code>?weights=URL</code> in the address bar to skip this dialog.</div>
    <pre id="setup-progress"></pre>
  </div>
</div>

<script type="module">
import { GGUF, loadGGUFFromURL } from './lib/gguf.js';
import { BPE, BOS, USER_START, USER_END, ASST_START, ASST_END, wrapJanusChat }
    from './lib/bpe.js';
import { YentEngine, sampleNext } from './lib/yent_engine.js';
import { Soma } from './lib/soma.js';

const $ = id => document.getElementById(id);
const log    = $('log');
const status = $('status');
const setup  = $('setup');
const setupProgress = $('setup-progress');
const stat_model = $('stat-model');
const stat_tps   = $('stat-tps');

let bpe   = null;
let engine= null;
let soma  = new Soma('default');
let stopFlag = false;
let busy = false;
const messages = [];   // [{role:'user'|'asst'|'err', text}]
let tail = [];          // recent context tokens (for soma persistence)

function setStatus(text, cls = '') {
    status.className = cls;
    status.textContent = text;
}

function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="role">${role === 'asst' ? 'yent' : role}</div>` +
                    `<div class="body"></div>`;
    div.querySelector('.body').textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    return div.querySelector('.body');
}

function rerenderHistory() {
    log.innerHTML = '';
    for (const m of messages) addMsg(m.role, m.text);
}

async function loadBPE() {
    setStatus('loading BPE merges…', 'busy');
    const resp = await fetch('janus_v4_bpe_merges.json');
    if (!resp.ok) throw new Error(`fetch merges: ${resp.status}`);
    const merges = await resp.json();
    bpe = new BPE(merges);
    setStatus(`BPE ready (vocab ${bpe.vocabSize}, merges ${bpe.nMerges}).`);
}

function pretty(bytes) {
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
    if (bytes < 1024 * 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    return `${(bytes / 1024 / 1024 / 1024).toFixed(2)} GB`;
}

async function loadFromURL(url) {
    setupProgress.textContent = `fetching ${url}…`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`fetch ${url}: ${resp.status}`);
    const total = +resp.headers.get('Content-Length') || 0;
    const reader = resp.body.getReader();
    const chunks = [];
    let got = 0;
    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        got += value.byteLength;
        setupProgress.textContent =
            `${pretty(got)}${total ? ' / ' + pretty(total) : ''} downloaded…`;
    }
    const ab = new Uint8Array(got);
    let p = 0;
    for (const c of chunks) { ab.set(c, p); p += c.byteLength; }
    return ab.buffer;
}

async function bootEngine(arrayBuffer) {
    setupProgress.textContent = 'parsing GGUF…';
    const gguf = new GGUF(arrayBuffer);
    setupProgress.textContent =
        `arch=${gguf.kv['general.architecture']}  V=${gguf.kv['janus.vocab_size']}  ` +
        `B=${gguf.kv['janus.block_count']}  E=${gguf.kv['janus.embedding_length']}  ` +
        `dequantising weights (~700 MB fp32)…`;
    // Yield to the browser before the long synchronous dequant pass.
    await new Promise(r => setTimeout(r, 16));
    engine = new YentEngine(gguf);
    engine.kvInit(Math.min(engine.T, 512));
    stat_model.textContent =
        `Janus ${engine.B}×${engine.E} V=${engine.V} R=${engine.R}`;
    setupProgress.textContent =
        `engine ready · KV-cache for up to ${engine.maxSeq} tokens`;
}

function hideSetup() {
    setup.style.display = 'none';
}

function loadSomaIntoUI() {
    const s = soma.load();
    if (!s) return;
    messages.length = 0;
    for (const m of (s.messages || [])) messages.push(m);
    tail = (s.tail || []).slice();
    rerenderHistory();
    setStatus(`restored ${messages.length} message(s) from soma.`);
}

function saveSoma() {
    soma.save({ messages, tail });
}

/* Generation loop — chat-format prompt + autoregressive decode + stream. */
async function runChat(userText) {
    if (busy) return;
    if (!engine || !bpe) {
        setStatus('engine not ready.', 'err');
        return;
    }
    busy = true;
    stopFlag = false;
    $('send').disabled = true;
    $('stop').disabled = false;

    messages.push({ role: 'user', text: userText });
    addMsg('user', userText);
    saveSoma();

    const promptIds = bpe.encode(userText);
    const wrapped   = wrapJanusChat(promptIds);   // [BOS, USER_START, ...ids, USER_END, ASST_START]

    /* Reset engine context — KV cache fresh each turn (browser memory).
     * If we wanted true continuation we'd thread the cache; for now each
     * turn is a stateless prompt-and-reply. Soma carries the visible
     * conversation so the user sees their history. */
    engine.kvInit(Math.min(engine.T, Math.max(256, wrapped.length + 256)));

    const ctx = wrapped.slice();
    let logits = null;

    setStatus(`prefill ${ctx.length} tokens…`, 'busy');
    await new Promise(r => setTimeout(r, 16));
    const t0 = performance.now();
    for (let i = 0; i < ctx.length; i++) {
        logits = engine.forwardToken(ctx[i], i);
    }
    const t_prefill = (performance.now() - t0) / 1000;
    setStatus(`prefill ${ctx.length} in ${t_prefill.toFixed(2)}s · generating…`, 'busy');

    const asstBody = addMsg('asst', '');
    const cursor   = document.createElement('span');
    cursor.id = 'cursor';
    asstBody.appendChild(cursor);

    const reply = [];
    const max_tokens = 200;
    const temp = 0.7, top_p = 0.9;
    const t1 = performance.now();
    let gen = 0;
    for (let step = 0; step < max_tokens; step++) {
        if (stopFlag) break;
        const next = sampleNext(logits, ctx, ctx.length, temp, top_p);
        if (next === ASST_END) break;
        reply.push(next);
        gen++;

        // decode the new token bit and append (one token at a time keeps
        // multi-byte UTF-8 from showing up half-decoded — bpe.decode joins
        // ranges by token, so we decode the running list and replace).
        const decoded = bpe.decode(reply);
        cursor.remove();
        asstBody.textContent = decoded;
        asstBody.appendChild(cursor);
        log.scrollTop = log.scrollHeight;

        ctx.push(next);
        if (ctx.length >= engine.maxSeq) break;
        logits = engine.forwardToken(next, ctx.length - 1);

        // Yield every 4 tokens so the browser can repaint and accept input.
        if ((step & 3) === 0) await new Promise(r => setTimeout(r, 0));
    }
    const t_gen = (performance.now() - t1) / 1000;
    cursor.remove();

    const text = bpe.decode(reply);
    messages.push({ role: 'asst', text });
    tail = ctx.slice(Math.max(0, ctx.length - 256));
    saveSoma();

    const tps = gen / Math.max(t_gen, 1e-3);
    stat_tps.textContent = `${tps.toFixed(1)} tok/s`;
    setStatus(`${gen} tokens · ${t_gen.toFixed(2)}s · ${tps.toFixed(1)} tok/s${stopFlag ? ' · stopped' : ''}.`);

    busy = false;
    stopFlag = false;
    $('send').disabled = false;
    $('stop').disabled = true;
}

/* ── UI wiring ───────────────────────────────────────────────────── */

$('send').addEventListener('click', () => {
    const ta = $('prompt');
    const t = ta.value.trim();
    if (!t) return;
    ta.value = '';
    runChat(t).catch(e => {
        addMsg('err', `error: ${e.message}`);
        setStatus(e.message, 'err');
        busy = false;
        $('send').disabled = false;
        $('stop').disabled = true;
    });
});

$('stop').addEventListener('click', () => { stopFlag = true; });

$('reset').addEventListener('click', () => {
    if (busy) return;
    if (!confirm('clear chat history and soma?')) return;
    messages.length = 0;
    tail = [];
    soma.clear();
    log.innerHTML = '';
    setStatus('soma cleared.');
});

$('prompt').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        $('send').click();
    } else if (e.key === 'Escape' && busy) {
        stopFlag = true;
    }
});

/* Load-url path */
$('load-url').addEventListener('click', async () => {
    const url = $('weights-url').value.trim();
    if (!url) return;
    try {
        const ab = await loadFromURL(url);
        await bootEngine(ab);
        hideSetup();
        loadSomaIntoUI();
    } catch (e) {
        setupProgress.textContent = 'error: ' + e.message;
    }
});

/* Load-file path */
$('load-file').addEventListener('click', async () => {
    const f = $('weights-file').files[0];
    if (!f) return;
    try {
        setupProgress.textContent = `reading ${f.name} (${pretty(f.size)})…`;
        const ab = await f.arrayBuffer();
        await bootEngine(ab);
        hideSetup();
        loadSomaIntoUI();
    } catch (e) {
        setupProgress.textContent = 'error: ' + e.message;
    }
});

/* Boot */
(async function () {
    try {
        await loadBPE();
        // ?weights=URL skips the setup dialog
        const params = new URLSearchParams(window.location.search);
        const wurl = params.get('weights');
        if (wurl) {
            const ab = await loadFromURL(wurl);
            await bootEngine(ab);
            hideSetup();
            loadSomaIntoUI();
        }
    } catch (e) {
        setupProgress.textContent = 'startup error: ' + e.message;
        setStatus(e.message, 'err');
    }
})();
</script>

</body>
</html>
